<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>이차방정식 공룡 게임</title>
    <style>
        body { text-align: center; background-color: #f7f7f7; font-family: sans-serif; margin: 0; padding: 20px; user-select: none; }
        #eq-box { font-size: 42px; font-weight: bold; margin: 15px; color: #2c3e50; height: 60px; }
        #game-view { position: relative; width: 800px; height: 200px; margin: 0 auto; background: white; border: 4px solid #333; border-radius: 10px; overflow: hidden; }
        canvas { display: block; }
        #ui-text { position: absolute; top: 12px; right: 20px; text-align: right; font-weight: bold; color: #555; }
        #over-view { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; z-index: 10; padding-top: 40px; box-sizing: border-box; }
        
        /* 점프 버튼 스타일 */
        #jump-btn { 
            width: 220px; height: 85px; font-size: 32px; font-weight: bold; 
            margin-top: 25px; background-color: #2ecc71; color: white; 
            border: none; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 8px #27ae60; outline: none;
        }
        #jump-btn:active { box-shadow: 0 3px #27ae60; transform: translateY(5px); }
        
        button.restart { padding: 10px 25px; font-size: 18px; cursor: pointer; font-weight: bold; background: #e67e22; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="eq-box">준비 중...</div>

    <div id="game-view">
        <div id="ui-text">
            Score: <span id="s-num">0</span><br>
            Next: <span id="q-num">5</span> left
        </div>
        <canvas id="cvs" width="800" height="200"></canvas>
        <div id="over-view">
            <h1 style="color:#ff7675; margin:0; font-size: 40px;">GAME OVER</h1>
            <p id="over-reason" style="margin:15px 0; font-size: 18px;"></p>
            <button class="restart" onclick="location.reload()">다시 시작하기</button>
        </div>
    </div>

    <button id="jump-btn">JUMP !</button>

    <p style="color: #666; margin-top: 20px;">
        <b>↑ 방향키 / 스페이스바 / 버튼으로 점프!</b><br>
        정답(해)은 몸으로 막고, 오답은 피하세요!
    </p>

    <script>
        var cvs = document.getElementById('cvs');
        var ctx = cvs.getContext('2d');
        var score = 0, isOver = false, frame = 0, obstacles = [], answers = [], passCount = 0, moveSpeed = 3.5;

        // 공룡 데이터
        var dino = { x: 50, y: 135, w: 50, h: 50, dy: 0, jump: -15, grav: 0.8, onGround: true };

        // 공룡을 직접 그리는 함수 (그림 파일이 없어도 실행됨)
        function drawDino(x, y) {
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(x + 5, y + 15, 30, 25); // 몸통
            ctx.fillRect(x + 20, y, 25, 20);      // 머리
            ctx.fillRect(x + 35, y + 10, 12, 5);  // 주둥이
            ctx.beginPath();
            ctx.moveTo(x + 5, y + 20); ctx.lineTo(x - 10, y + 35); ctx.lineTo(x + 5, y + 40);
            ctx.fill(); // 꼬리
            ctx.fillRect(x + 10, y + 40, 8, 10); // 다리1
            ctx.fillRect(x + 22, y + 40, 8, 10); // 다리2
            ctx.fillStyle = "white"; ctx.fillRect(x + 38, y + 4, 5, 5); // 눈
            ctx.fillStyle = "black"; ctx.fillRect(x + 41, y + 6, 2, 2); // 눈동자
        }

        function makeQuiz() {
            var x1 = Math.floor(Math.random() * 11);
            var x2 = Math.floor(Math.random() * 9) - 4;
            answers = [x1, x2];
            var b = -(x1 + x2), c = x1 * x2;
            var bTxt = b !== 0 ? (b > 0 ? " + " : " - ") + (Math.abs(b) === 1 ? "" : Math.abs(b)) + "x" : "";
            var cTxt = c === 0 ? "" : (c > 0 ? " + " + c : " - " + Math.abs(c));
            document.getElementById('eq-box').innerHTML = "x²" + bTxt + cTxt + " = 0";
            passCount = 0; 
            document.getElementById('q-num').innerText = "5";
        }

        function doJump() {
            if (dino.onGround && !isOver) {
                dino.dy = dino.jump;
                dino.onGround = false;
            }
        }

        function update() {
            if (isOver) return;
            ctx.clearRect(0, 0, 800, 200);
            ctx.strokeStyle = "#ddd"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, 185); ctx.lineTo(800, 185); ctx.stroke();

            dino.dy += dino.grav; dino.y += dino.dy;
            if (dino.y > 135) { dino.y = 135; dino.dy = 0; dino.onGround = true; }

            drawDino(dino.x, dino.y);

            if (frame % 150 === 0) {
                var isAns = Math.random() < 0.5;
                var n = isAns ? answers[Math.floor(Math.random() * 2)] : Math.floor(Math.random() * 20) - 7;
                obstacles.push({ x: 800, y: 145, num: n });
            }

            for (var i = obstacles.length - 1; i >= 0; i--) {
                var o = obstacles[i]; o.x -= moveSpeed;
                ctx.fillStyle = "#ff7675"; ctx.fillRect(o.x, o.y, 40, 40);
                ctx.fillStyle = "white"; ctx.font = "bold 22px Arial"; ctx.textAlign = "center";
                ctx.fillText(o.num, o.x + 20, o.y + 27);

                if (dino.x < o.x + 40 && dino.x + dino.w > o.x && dino.y < o.y + 40 && dino.y + dino.h > o.y) {
                    if (answers.indexOf(o.num) !== -1) {
                        score += 20; document.getElementById('s-num').innerText = score;
                        obstacles.splice(i, 1); handleScore();
                    } else gameOver(o.num + "은 해가 아니에요!");
                } else if (o.x + 40 < 0) {
                    if (answers.indexOf(o.num) !== -1) gameOver("정답 " + o.num + "을 놓쳤어요!");
                    else { score += 10; document.getElementById('s-num').innerText = score; obstacles.splice(i, 1); handleScore(); }
                }
            }
            frame++; requestAnimationFrame(update);
        }

        function handleScore() {
            passCount++; document.getElementById('q-num').innerText = Math.max(0, 5 - passCount);
            if (passCount >= 5) makeQuiz();
        }

        function gameOver(m) {
            isOver = true; document.getElementById('over-view').style.display = "block";
            document.getElementById('over-reason').innerText = m;
        }

        window.onkeydown = function(e) { if (e.keyCode === 38 || e.keyCode === 32) { e.preventDefault(); doJump(); } };
        var btn = document.getElementById('jump-btn');
        btn.onclick = function(e) { e.preventDefault(); doJump(); };

        // 즉시 실행 (이미지 로딩 기다리지 않음)
        makeQuiz();
        update(); 
    </script>
</body>
</html>
